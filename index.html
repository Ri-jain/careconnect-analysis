  '10025': { name:'Upper West Side',   borough:'Manhattan' },
  '10029': { name:'East Harlem',       borough:'Manhattan' },
  '10032': { name:'Washington Heights',borough:'Manhattan' },
  '10034': { name:'Inwood',            borough:'Manhattan' },
  '10452': { name:'Highbridge',        borough:'Bronx'     },
  '10453': { name:'University Heights',borough:'Bronx'     },
  '10456': { name:'Morrisania',        borough:'Bronx'     },
  '10457': { name:'East Tremont',      borough:'Bronx'     },
  '10462': { name:'Parkchester',       borough:'Bronx'     },
  '10463': { name:'Kingsbridge',       borough:'Bronx'     },
  '10467': { name:'Norwood',           borough:'Bronx'     },
  '10473': { name:'Clason Point',      borough:'Bronx'     },
  '11206': { name:'Williamsburg',      borough:'Brooklyn'  },
  '11207': { name:'East New York',     borough:'Brooklyn'  },
  '11208': { name:'East New York',     borough:'Brooklyn'  },
  '11212': { name:'Brownsville',       borough:'Brooklyn'  },
  '11226': { name:'Flatbush',          borough:'Brooklyn'  },
};

function getZipLabel(zip, fallbackCity) {
  const info = NYC_NEIGHBOURHOODS[String(zip)];
  return info ? `${zip} - ${info.name}` : `${zip} - ${fallbackCity}`;
}

function getBoroughFromZip(zip) {
  const info = NYC_NEIGHBOURHOODS[String(zip)];
  if (info) return info.borough;
  const z = parseInt(zip);
  if (z >= 10001 && z <= 10282) return 'Manhattan';
  if (z >= 10451 && z <= 10475) return 'Bronx';
  if (z >= 11201 && z <= 11256) return 'Brooklyn';
  if (z >= 11001 && z <= 11436) return 'Queens';
  if (z >= 10301 && z <= 10314) return 'Staten Island';
  return null;
}

function getZipColor(zip, state) {
  const borough = getBoroughFromZip(zip);
  if (borough) return BOROUGH_COLORS[borough] || C.blue;
  return STATE_COLORS[state] || C.blue;
}

function fmtNum(v) {
  if (v === undefined || v === null) return '';
  return v.toLocaleString();
}

function ChartCard({ title, subtitle, children, style }) {
  return (
    <div style={{ background:'#fff', borderRadius:12, padding:'16px 20px',
                  boxShadow:C.cardShadow, ...style }}>
      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{title}</div>
        {subtitle && <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{subtitle}</div>}
      </div>
      {children}
    </div>
  );
}

function pieTooltip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const p = payload[0];
  const total = p.payload && p.payload.__total ? p.payload.__total : 0;
  const pct = total ? ((p.value / total) * 100).toFixed(1) : '0.0';
  return (
    <div style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:8, padding:'8px 12px', fontSize:12 }}>
      <div style={{ fontWeight:700, color:C.text }}>{p.name}</div>
      <div style={{ color:C.muted }}>{fmtNum(p.value)} shifts ({pct}%)</div>
    </div>
  );
}

function trendTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:8, padding:'8px 12px', fontSize:12 }}>

}

function zipTooltip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const d = payload[0].payload;
  const borough = getBoroughFromZip(d.zip);
  const label   = getZipLabel(d.zip, d.city);
  return (
    <div style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:8, padding:'8px 12px', fontSize:12 }}>
      <div style={{ fontWeight:700, color:C.text }}>{label}</div>
      <div style={{ color:C.muted }}>{borough ? `${borough}, ${d.state}` : d.state}</div>
      <div style={{ color:C.text, marginTop:4 }}>Total: {fmtNum(d.total)}</div>
      <div style={{ color:C.red }}>Unmet: {fmtNum(d.unmet)} ({d.unmet_rate.toFixed(1)}%)</div>
    </div>

}

const LABELED_STATES = new Set(['NY','MA','NJ','FL','VA','IL','CT','PA']);
function ScatterDot(props) {
  const { cx, cy, payload } = props;
  if (cx === undefined || cy === undefined) return null;
  const show = LABELED_STATES.has(payload.state);
  const color = payload.unmet_rate > 20 ? C.red : payload.unmet_rate > 10 ? C.orange : C.green;
  const r = Math.max(6, Math.min(18, Math.sqrt(payload.total) / 30));
  return (
    <g>
      <circle cx={cx} cy={cy} r={r} fill={color} fillOpacity={0.65} stroke={color} strokeWidth={1.5} />
      {show && (
        <text x={cx} y={cy - r - 4} textAnchor="middle" fontSize={11} fontWeight={700} fill={C.text}>
          {payload.state}
        </text>
      )}
    </g>
  );
}

function CaregiverDonut() {
  const ALL_SEGMENTS = [
    { name:'Active',     value:81952, color:C.teal   },
    { name:'On Hold',    value:2155,  color:C.orange  },
    { name:'Terminated', value:1483,  color:C.red     },
    { name:'Pending',    value:44,    color:C.blue    },
    { name:'Cancelled',  value:3,     color:C.gray    },
  ];
  const TOTAL = ALL_SEGMENTS.reduce((s,d) => s + d.value, 0);
  const [hidden, setHidden] = React.useState({});
  const toggle = (name) => setHidden(h => ({ ...h, [name]: !h[name] }));
  const visible = ALL_SEGMENTS.filter(d => !hidden[d.name]);
  const visTotal = visible.reduce((s,d) => s + d.value, 0);

  return (
    <ChartCard title="Caregiver Registry" subtitle="85,637 total staff in system (staff status)" style={{ flex:'0 0 28%' }}>
      <div style={{ position:'relative' }}>
        <ResponsiveContainer width="100%" height={230}>
          <PieChart>
            <Pie data={visible} dataKey="value" nameKey="name" cx="50%" cy="50%"
                 innerRadius={55} outerRadius={88} paddingAngle={2}
                 onClick={(d) => toggle(d.name)} style={{ cursor:'pointer' }}>
              {visible.map((d) => <Cell key={d.name} fill={d.color} />)}
            </Pie>
            <Tooltip formatter={(v, name) => [`${fmtNum(v)} (${(v/TOTAL*100).toFixed(1)}%)`, name]} />
          </PieChart>
        </ResponsiveContainer>
        <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0,
                      display:'flex', flexDirection:'column', alignItems:'center',
                      justifyContent:'center', pointerEvents:'none' }}>
          <div style={{ fontSize:20, fontWeight:700, color:C.text, lineHeight:1 }}>{fmtNum(visTotal)}</div>
          <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>shown</div>
        </div>
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:'4px 10px', marginTop:6, justifyContent:'center' }}>
        {ALL_SEGMENTS.map(d => (
          <button key={d.name} onClick={() => toggle(d.name)}
            style={{ display:'flex', alignItems:'center', gap:5, background:'none', border:'none',
                     cursor:'pointer', padding:'2px 6px', borderRadius:4,
                     opacity: hidden[d.name] ? 0.35 : 1,
                     boxShadow: hidden[d.name] ? 'none' : `0 0 0 1px ${d.color}22` }}>
            <span style={{ width:10, height:10, borderRadius:'50%', background:d.color, flexShrink:0 }} />
            <span style={{ fontSize:11, color:C.text }}>{d.name}</span>
            <span style={{ fontSize:11, color:C.muted }}>{fmtNum(d.value)}</span>
          </button>
        ))}
      </div>
      <div style={{ fontSize:11, color:C.muted, textAlign:'center', marginTop:4 }}>Click segment or label to toggle</div>
    </ChartCard>
  );
}

    { name:'Filled',    value: kpis.filled    || 0, __total: kpis.total },
    { name:'Cancelled', value: kpis.cancelled || 0, __total: kpis.total },
    { name:'Unfilled',  value: kpis.unfilled  || 0, __total: kpis.total }

  const donutColors = [C.green, C.gray, C.red];

  const cancelledRate = kpis.total ? ((kpis.cancelled || 0) / kpis.total * 100) : 0;
  const unfilledRate  = kpis.total ? ((kpis.unfilled  || 0) / kpis.total * 100) : 0;

function RootCausePage({ invitation, duration, hourData, statesData, selectedState, kpis = {} }) {
  const hasInviteData = invitation && invitation.filled_invites != null && invitation.filled_invites > 0;

  const inviteData = hasInviteData
    ? [
        { metric:'Invitations Sent',    filled: invitation.filled_invites, unfilled: invitation.unfilled_invites || 0 },
        { metric:'Caregivers Involved', filled: invitation.filled_cg || 0, unfilled: invitation.unfilled_cg || 0 }
      ]
    : null;

  /* ratio: filled_cg / unfilled_cg is always available and meaningful */
  const invRatio = hasInviteData && invitation.filled_cg && invitation.unfilled_cg
    ? (invitation.filled_cg / invitation.unfilled_cg).toFixed(1)
    : null;

  const filledDeclineRate   = invitation?.filled_decline_rate   != null ? (invitation.filled_decline_rate   * 100).toFixed(2) : null;
  const unfilledDeclineRate = invitation?.unfilled_decline_rate != null ? (invitation.unfilled_decline_rate * 100).toFixed(2) : null;
  const filledApplyRate     = invitation?.filled_apply_rate     != null ? (invitation.filled_apply_rate     * 100).toFixed(1) : null;
  const unfilledApplyRate   = invitation?.unfilled_apply_rate   != null ? (invitation.unfilled_apply_rate   * 100).toFixed(1) : null;
  const assignLatencyHrs    = invitation?.filled_assign_latency_hrs != null ? invitation.filled_assign_latency_hrs : null;
  const assignLatencyLabel  = assignLatencyHrs != null
    ? (assignLatencyHrs < 1 ? `${Math.round(assignLatencyHrs * 60)} min` : `${assignLatencyHrs.toFixed(1)} hrs`)
    : null;

  const scatterStates = (statesData || []).filter(s => s.supply_ratio > 0);
  const sortedSupply = scatterStates.map(s => s.supply_ratio).sort((a, b) => a - b);
  const medianSupply = sortedSupply.length
    ? sortedSupply[Math.floor(sortedSupply.length / 2)]
    : 50;

  const tableStates = [...(statesData || [])].sort((a, b) => b.unmet_rate - a.unmet_rate).slice(0, 10);

  const avgHourRate = hourData && hourData.length
    ? hourData.reduce((s, d) => s + d.unmet_rate, 0) / hourData.length
    : 0;

  const durUnder1 = duration && duration.find(d => d.bucket === '<1h');
  const dur4_8    = duration && duration.find(d => d.bucket === '4-8h');
  const dur12plus = duration && duration.find(d => d.bucket === '12h+');

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:22, fontWeight:700, color:C.text }}>Exploratory Factors</div>
        <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>
          Analysis of unmet shifts across operational, duration, and geographic factors
        </div>
      </div>

      {/* FACTOR 1 */}
      <SectionBar factor="FACTOR 1" text="Decline Rate, Invite-to-Apply Rate & Assignment Latency" />

      {/* Decline Rate + Invite + Latency row */}
      <div style={{ display:'flex', gap:16, marginBottom:20 }}>
        <ChartCard title="Decline Rate"
          subtitle="% of offered caregivers who actively declined"
          style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center',
                        justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.green, lineHeight:1 }}>
              {filledDeclineRate != null ? `${filledDeclineRate}%` : 'N/A'}
            </div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>of offered caregivers declined</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#f8fafc', borderRadius:8,
                        fontSize:12, color:C.muted }}>
            Based on December 2025 caregiver-shift sample (1,000 rows). Full dataset pending.
          </div>
        </ChartCard>

        <ChartCard title="Invite-to-Apply Rate"
          subtitle="% of invited caregivers who applied for the shift"
          style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center',
                        justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.orange, lineHeight:1 }}>
              {filledApplyRate != null ? `${filledApplyRate}%` : 'N/A'}
            </div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>of invited caregivers applied</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#f8fafc', borderRadius:8,
                        fontSize:12, color:C.muted }}>
            Based on December 2025 caregiver-shift sample (1,000 rows). Full dataset pending.
          </div>
        </ChartCard>

        <ChartCard title="Assignment Latency"
          subtitle="Avg time from first invitation sent to caregiver confirmation"
          style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center',
                        justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.teal, lineHeight:1 }}>
              {assignLatencyLabel != null ? assignLatencyLabel : 'N/A'}
            </div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>avg invite-to-assign time</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#f8fafc', borderRadius:8,
                        fontSize:12, color:C.muted }}>
            Based on December 2025 caregiver-shift sample (1,000 rows). Full dataset pending.
          </div>
        </ChartCard>
      </div>

      {/* FACTOR 2 */}
      <SectionBar factor="FACTOR 2" text="Shift Duration & Time of Day" />
      <div style={{ display:'flex', gap:16, marginBottom:16 }}>
        <ChartCard title="Shift Duration vs Unmet Rate"
          subtitle="Shorter shifts are harder to fill - commute cost exceeds shift value"
          style={{ flex:1.4 }}>
          <ResponsiveContainer width="100%" height={240}>
            <ComposedChart data={duration} margin={{ top:10, right:30, left:0, bottom:5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="bucket" tick={{ fontSize:12 }} />
              <YAxis yAxisId="left"  tickFormatter={(v) => `${(v/1000).toFixed(0)}K`} tick={{ fontSize:11 }} />
              <YAxis yAxisId="right" orientation="right" tickFormatter={(v) => `${v}%`} tick={{ fontSize:11 }} />
              <Tooltip content={durationTooltip} />
              <Legend wrapperStyle={{ fontSize:11 }} />
              <Bar  yAxisId="left"  dataKey="total"     fill={C.blue} fillOpacity={0.6} name="Total Shifts" />
              <Line yAxisId="right" dataKey="unmet_rate" stroke={C.red} strokeWidth={2.5} dot={true} name="Unmet Rate %" />
            </ComposedChart>
          </ResponsiveContainer>
        </ChartCard>

        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12 }}>
          <MiniStat accent={C.red}
            big={durUnder1 ? `${durUnder1.unmet_rate.toFixed(1)}%` : 'N/A'}
            label="Unmet Rate - Shifts < 1 Hour"
            sub={durUnder1 && dur12plus && dur12plus.unmet_rate > 0
              ? `${(durUnder1.unmet_rate / dur12plus.unmet_rate).toFixed(1)}× harder than 12h+ shifts` : ''} />
          <MiniStat accent={C.orange}
            big={dur4_8 ? `${dur4_8.unmet_rate.toFixed(1)}%` : 'N/A'}
            label="Unmet Rate - 4-8h Shifts (Largest Cohort)"
            sub={dur4_8 ? `${fmtNum(dur4_8.total)} shifts at risk` : ''} />
          <MiniStat accent={C.green}
            big={dur12plus ? `${dur12plus.unmet_rate.toFixed(1)}%` : 'N/A'}
            label="Unmet Rate - 12h+ Shifts"
            sub="Caregivers strongly prefer longer shifts" />
        </div>
      </div>

      <ChartCard title="Unmet Rate by Hour of Day"
        subtitle="Overnight and late-evening hours are structurally hardest to staff"
        style={{ marginBottom:20 }}>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={hourData} margin={{ top:20, right:20, left:0, bottom:5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
            <XAxis dataKey="hour" ticks={[0,6,12,18,22]} tickFormatter={(v) => `${v}:00`} tick={{ fontSize:11 }} />
            <YAxis tickFormatter={(v) => `${v}%`} tick={{ fontSize:11 }} />
            <Tooltip formatter={(v) => `${v.toFixed(2)}%`} labelFormatter={(v) => `Hour ${v}:00`} />
            <ReferenceLine y={avgHourRate} stroke={C.gray} strokeDasharray="4 4"
              label={{ value:`Avg ${avgHourRate.toFixed(1)}%`, position:'right', fontSize:11, fill:C.gray }} />
            <Bar dataKey="unmet_rate" name="Unmet Rate">
              {(hourData || []).map((entry, i) => {
                const h = entry.hour;
                const fill = (h < 6 || h >= 22) ? C.red : h < 18 ? C.blue : C.orange;
                return <Cell key={i} fill={fill} />;
              })}
              <LabelList dataKey="unmet_rate" content={(props) => {
                const { x, y, width, value, index } = props;
                const h = hourData[index] && hourData[index].hour;
                if (h === undefined || !(h <= 5 || h >= 20)) return null;
                return (
                  <text x={x + width / 2} y={y - 4} fill={C.text} fontSize={10} textAnchor="middle">
                    {value.toFixed(1)}%
                  </text>
                );
              }} />
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </ChartCard>

      {/* FACTOR 3 */}
      <SectionBar factor="FACTOR 3" text="Caregiver Supply Coverage" />

      {/* Supply metric cards */}
      <div style={{ display:'flex', gap:16, marginBottom:16 }}>
        <ChartCard title="Active Caregiver Count" subtitle="Registered active caregivers in system" style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.teal, lineHeight:1 }}>
              {fmtNum(kpis.active_cg || 0)}
            </div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>active caregivers</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#f0fdfa', borderRadius:8, fontSize:12, color:'#065f46' }}>
             NY accounts for ~67% of all active caregivers (55,208 of 81,952).
          </div>
        </ChartCard>

        <ChartCard title="Caregiver-to-Shift Ratio" subtitle="Active caregivers per 100 shifts in selected view" style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.orange, lineHeight:1 }}>
              {(kpis.cg_shift_ratio || 0).toFixed(1)}%
            </div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>caregivers per 100 shifts</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#fff7ed', borderRadius:8, fontSize:12, color:'#92400e' }}>
             ~3 active caregivers per 100 shifts system-wide - structural supply shortage despite 82K active staff.
          </div>
        </ChartCard>

        <ChartCard title="ZIP Supply Gap" subtitle="Share of shift ZIPs with zero registered caregivers" style={{ flex:1 }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:120 }}>
            <div style={{ fontSize:48, fontWeight:700, color:C.red, lineHeight:1 }}>39.4%</div>
            <div style={{ fontSize:12, color:C.muted, marginTop:8 }}>of shift ZIPs have no active caregivers</div>
          </div>
          <div style={{ marginTop:8, padding:'8px 12px', background:'#fef2f2', borderRadius:8, fontSize:12, color:'#991b1b' }}>
             1,346 of 3,413 shift ZIPs have zero active caregivers in the same ZIP. Caregivers may travel from adjacent ZIPs.
          </div>
        </ChartCard>
      </div>

      {/* Supply scatter + state table */}
      <div style={{ display:'flex', gap:16, marginBottom:20 }}>
        <ChartCard title="Caregiver Supply vs Unmet Rate"
          subtitle="Bubble size = shift volume · Low supply → high unmet"
          style={{ flex:1.2 }}>
          <ResponsiveContainer width="100%" height={300}>
            <ScatterChart margin={{ top:20, right:30, left:0, bottom:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis type="number" dataKey="supply_ratio" name="Supply Ratio" tick={{ fontSize:11 }}
                label={{ value:'Supply Ratio', position:'insideBottom', offset:-10, fontSize:11, fill:C.muted }} />
              <YAxis type="number" dataKey="unmet_rate" name="Unmet Rate"
                tickFormatter={(v) => `${v}%`} tick={{ fontSize:11 }}
                label={{ value:'Unmet Rate', angle:-90, position:'insideLeft', fontSize:11, fill:C.muted }} />
              <ZAxis type="number" dataKey="total" range={[40, 800]} name="Total Shifts" />
              <Tooltip content={scatterTooltip} cursor={{ strokeDasharray:'3 3' }} />
              {sortedSupply.length > 0 && (
                <ReferenceLine x={medianSupply} stroke={C.gray} strokeDasharray="4 4"
                  label={{ value:`Median ${medianSupply.toFixed(0)}`, position:'top', fontSize:11, fill:C.gray }} />
              )}
              <Scatter name="States" data={scatterStates} shape={<ScatterDot />} />
            </ScatterChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="State Performance Table" subtitle="Sorted by unmet rate · Top 10" style={{ flex:1 }}>
          <div style={{ maxHeight:300, overflowY:'auto', border:'1px solid '+C.border, borderRadius:8 }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
              <thead style={{ position:'sticky', top:0, background:'#f8fafc', zIndex:1 }}>
                <tr style={{ textAlign:'left', color:C.muted }}>
                  <th style={{ padding:'8px 10px', borderBottom:'1px solid '+C.border }}>State</th>
                  <th style={{ padding:'8px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>Total</th>
                  <th style={{ padding:'8px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>Unmet %</th>
                  <th style={{ padding:'8px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>Fill %</th>
                  <th style={{ padding:'8px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>Supply</th>
                </tr>
              </thead>
              <tbody>
                {tableStates.map((s, i) => {
                  const isSelected = selectedState !== 'All' && s.state === selectedState;
                  const bg = isSelected ? '#eff6ff'
                    : s.unmet_rate > 20 ? '#fee2e2'
                    : s.unmet_rate < 5 ? '#dcfce7'
                    : 'transparent';
                  return (
                    <tr key={i} style={{ background:bg }}>
                      <td style={{ padding:'7px 10px', borderBottom:'1px solid '+C.border, fontWeight:600,
                                   color: isSelected ? C.blue : C.text }}>
                        {s.state}{isSelected ? ' ◀' : ''}
                      </td>
                      <td style={{ padding:'7px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>{fmtNum(s.total)}</td>
                      <td style={{ padding:'7px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>{s.unmet_rate.toFixed(2)}%</td>
                      <td style={{ padding:'7px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>{s.fill_rate.toFixed(2)}%</td>
                      <td style={{ padding:'7px 10px', borderBottom:'1px solid '+C.border, textAlign:'right' }}>{s.supply_ratio.toFixed(1)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </ChartCard>
      </div>

      {/* Recommendations */}
      <div style={{ display:'flex', gap:16 }}>
        <RecCard num="1" accent={C.red}
          title="Geo-Targeted Recruitment"
          body="Focus caregiver recruiting and retention on Bronx/Brooklyn supply-desert ZIPs where unmet demand is concentrated."
          track="Track: Active CGs per 1,000 shifts in target ZIPs" />
        <RecCard num="2" accent={C.orange}
          title="Expand Invitation Pool"
          body="Auto-escalate shifts with zero applications after 4 hours to a broader caregiver cohort and raise invite caps for at-risk shifts."
          track="Track: % shifts with ≥1 application within 4 hours" />
        <RecCard num="3" accent={C.green}
          title="Incentivise Hard-to-Fill"
          body="Premium pay or bonuses for <2h shifts and Friday coverage - the two structural pain points for supply."
          track="Track: <2h fill rate · Friday fill rate" />
      </div>
    </div>
  );
}

function Dashboard() {
  const [rawData, setRawData] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [page, setPage]                 = useState('overview');
  const [month, setMonth]               = useState('Both');
  const [selectedState, setSelectedState] = useState('All');

  useEffect(() => {
    try {
      const el = document.getElementById('dashboard-data-inline');
      if (el) { setRawData(JSON.parse(el.textContent)); return; }
    } catch(e) {}
    fetch('./dashboard_data2.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(setRawData)
      .catch(err => setLoadError(err.message));
  }, []);

  if (loadError) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
                  height:'100vh', flexDirection:'column', gap:12 }}>
      <div style={{ fontSize:18, color:C.red, fontWeight:700 }}>Failed to load dashboard data</div>
      <div style={{ fontSize:13, color:C.muted }}>{loadError}</div>
      <div style={{ fontSize:12, color:C.muted }}>Ensure dashboard_data2.json is served from the same directory</div>
    </div>
  );

  if (!rawData) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
                  height:'100vh', flexDirection:'column', gap:16 }}>
      <div style={{ width:48, height:48, border:`4px solid ${C.border}`,
                    borderTopColor:C.blue, borderRadius:'50%',
                    animation:'spin 0.8s linear infinite' }} />
      <div style={{ fontSize:15, color:C.blue, fontWeight:600 }}>Loading CareConnect Analytics…</div>
    </div>
  );

  const { slices: SLICES, time_trend: TIME_TREND, states_table: STATES_TABLE,
          state_list: STATE_LIST, state_trends: STATE_TRENDS } = rawData;

  const sliceKey = `${selectedState}__${month}`;
  const slice    = SLICES[sliceKey] || SLICES['All__Both'];

  const kpis = slice.kpis;

  const baseTrend = (selectedState !== 'All' && STATE_TRENDS && STATE_TRENDS[selectedState])
    ? STATE_TRENDS[selectedState]
    : TIME_TREND;

  const trendData = month === 'Dec 2025' ? baseTrend.filter(d => d.month === 'Dec')
    : month === 'Jan 2026'  ? baseTrend.filter(d => d.month === 'Jan')
    : baseTrend;

  const statesData = STATE_LIST.map(state => {
    const s    = SLICES[`${state}__${month}`];
    const info = STATES_TABLE.find(si => si.state === state) || {};
    if (!s) return null;
    return {
      state,
      total:        s.kpis.total,
      unmet_rate:   s.kpis.unmet_rate,
      fill_rate:    s.kpis.fill_rate,
      supply_ratio: info.supply_ratio || 0
    };
  }).filter(Boolean).filter(s => s.total > 0);

  const allStates  = ['All', ...STATE_LIST.slice().sort()];
  const periodLabel = month === 'Both' ? 'Dec 2025 - Jan 2026' : month;
  const monthButtons = ['Both', 'Dec 2025', 'Jan 2026'];

  const navItem = (key, icon, label) => {
    const active = page === key;
    return (
      <div key={key} onClick={() => setPage(key)} style={{
        padding:'10px 14px', fontSize:13, cursor:'pointer',
        display:'flex', alignItems:'center', gap:8,
        background: active ? C.blue : 'transparent',
        borderRadius:8, marginBottom:4, color:'white', transition:'background 0.15s'
      }}
        onMouseEnter={e => { if (!active) e.currentTarget.style.background = C.sidebarHover; }}
        onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
      >
        <span>{icon}</span><span>{label}</span>
      </div>
    );
  };

  const monthBtn = m => {
    const active = month === m;
    return (
      <button key={m} onClick={() => setMonth(m)} style={{
        padding:'5px 10px', fontSize:11,
        border: active ? 'none' : '1px solid #475569',
        background: active ? C.blue : 'transparent',
        color:'white', borderRadius:999, cursor:'pointer', marginRight:6, marginBottom:4
      }}>{m}</button>
    );
  };

  return (
    <div style={{ display:'flex', height:'100vh', fontFamily:'system-ui,-apple-system,sans-serif', overflow:'hidden' }}>
      {/* SIDEBAR */}
      <div style={{ width:220, background:C.sidebar, color:'white',
                    display:'flex', flexDirection:'column', padding:0, overflowY:'auto' }}>
        <div style={{ padding:'20px 16px' }}>
          <div style={{ fontSize:18, fontWeight:700, color:'white' }}>CareConnect</div>
          <div style={{ fontSize:11, color:'#94a3b8', marginTop:2 }}>Staffing Analytics</div>
        </div>
        <div style={{ padding:8 }}>
          {navItem('overview',   '', 'Overview')}
          {navItem('rootcause',  '', 'Exploratory Factors')}
        </div>
        <div style={{ height:1, background:'#2d2d44', margin:'8px 16px' }} />
        <div style={{ padding:'0 16px 16px' }}>
          <div style={{ fontSize:10, color:'#64748b', fontWeight:700, letterSpacing:1, marginBottom:8 }}>FILTERS</div>
          <div style={{ fontSize:11, color:'#94a3b8', marginBottom:6 }}>Period</div>
          <div style={{ display:'flex', flexWrap:'wrap', marginBottom:14 }}>
            {monthButtons.map(monthBtn)}
          </div>
          <div style={{ fontSize:11, color:'#94a3b8', marginBottom:6 }}>State</div>
          <select value={selectedState} onChange={e => setSelectedState(e.target.value)} style={{
            background:'#2d2d44', color:'white', border:'none',
            borderRadius:6, padding:'6px 8px', fontSize:12, width:'100%'
          }}>
            {allStates.map(s => <option key={s} value={s}>{s === 'All' ? 'All States' : s}</option>)}
          </select>
        </div>
        <div style={{ marginTop:'auto', padding:16, fontSize:11, color:'#475569',
                      borderTop:'1px solid #2d2d44' }}>
          {fmtNum(kpis.total)} shifts · {STATE_LIST.length} states
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
        <div style={{ background:'white', padding:'16px 24px',
                      borderBottom:'1px solid '+C.border,
                      display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:C.text }}>CareConnect Staffing Analytics</div>
            <div style={{ fontSize:13, color:C.muted, marginTop:2 }}>
              Caregiver Supply & Unmet Demand · {periodLabel}{selectedState !== 'All' ? ` · ${selectedState}` : ''}
            </div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {month !== 'Both' && (
              <span style={{ background:'#eff6ff', color:C.blue, fontSize:11, fontWeight:600,
                             padding:'5px 12px', borderRadius:999, border:'1px solid #bfdbfe' }}>
                {month}
              </span>
            )}
            {selectedState !== 'All' && (
              <span style={{ background:'#f5f3ff', color:C.purple, fontSize:11, fontWeight:600,
                             padding:'5px 12px', borderRadius:999, border:'1px solid #ddd6fe' }}>
                State: {selectedState}
              </span>
            )}
          </div>
        </div>

        <div style={{ padding:'20px 24px' }}>
          {page === 'overview'
            ? <OverviewPage
                kpis={kpis}
                trendData={trendData}
                topZips={slice.top_zips}
                dow={slice.dow}
                month={month}
                selectedState={selectedState}
                periodLabel={periodLabel}
              />
            : <ErrorBoundary>
                <RootCausePage
                  invitation={slice.invitation}
                  duration={slice.duration}
                  hourData={slice.hour_data}
                  statesData={statesData}
                  selectedState={selectedState}
                  kpis={kpis}
                />
              </ErrorBoundary>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard, null));
  </script>
</body>
</html>
